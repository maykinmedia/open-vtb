components:
  schemas:
    Base_ExterneTaakPolymorphicSerializer:
      type: object
      properties:
        url:
          type: string
          format: uri
          readOnly: true
          description: De unieke URL van de externe taak deze API.
          minLength: 1
          maxLength: 1000
        urn:
          type: string
          format: urn
          example: urn:namespace:component:resource:uuid
          readOnly: true
          description: De Uniform Resource Name van de externe taak.
        uuid:
          type: string
          format: uuid
          readOnly: true
          description: Een UUID waarmee een ZAC een link kan leggen tussen de taak
            en zijn eigen administratie.
        titel:
          type: string
          description: Titel van de uit te voeren taak, zoals die door eindgebruikers
            gezien kan worden in bijvoorbeeld een portaal.
          maxLength: 100
        verwerkerTaakId:
          type: string
          title: Titel
          description: Een identifier van het process dat deze taak verwerkt.
          maxLength: 36
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          description: Status van de taak.
        startdatum:
          type: string
