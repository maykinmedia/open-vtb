- name: formuliertaken
  description: |-
    Het veld `formDefinition` bevat het JSON-schema dat de structuur van het formulier definieert dat bij de taak hoort. Het specificeert de beschikbare velden, hun gegevenstypen, validatieregels en welke eigenschappen verplicht zijn. Een JSON-schema om te valideren:

    ```json
    {
        "$schema": "http://json-schema.org/draft-07/schema#",
        "title": "Formulier Schema",
        "type": "object",
        "properties": {
            "components": {
                "type": "array",
                "items": {
                    "type": "object",
                    "properties": {
                        "label": {
                            "type": "string"
                        },
                        "key": {
                            "type": "string"
                        },
                        "type": {
                            "type": "string"
                        },
                        "fileTypes": {
                            "type": "array",
                            "items": {
                                "type": "object",
                                "properties": {
                                    "label": {
                                        "type": "string"
                                    },
                                    "value": {
                                        "type": "string"
                                    }
                                },
                                "required": [
                                    "label",
                                    "value"
                                ]
                            }
                        },
                        "values": {
                            "type": "array",
                            "items": {
                                "type": "object",
                                "properties": {
                                    "label": {
                                        "type": "string"
                                    },
                                    "value": {
                                        "type": "string"
                                    }
                                },
                                "required": [
                                    "label",
                                    "value"
                                ]
                            }
                        },
                        "format": {
                            "type": "string"
                        },
                        "enableTime": {
                            "type": "boolean"
                        },
                        "decimalLimit": {
                            "type": "number"
                        },
                        "data": {
                            "type": "object",
                            "properties": {
                                "values": {
                                    "type": "array",
                                    "items": {
                                        "type": "object",
                                        "properties": {
                                            "label": {
                                                "type": "string"
                                            },
                                            "value": {
                                                "type": "string"
                                            }
                                        },
                                        "required": [
                                            "label",
                                            "value"
                                        ]
                                    }
                                }
                            },
                            "required": [
                                "values"
                            ]
                        }
                    },
                    "required": [
                        "label",
                        "key",
                        "type"
                    ]
                }
            }
        },
        "required": [
            "components"
        ]
    }
    ```
