name: Code quality checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# least privilege as default, should be overridden per job if necessary
permissions:
  contents: read

jobs:
  open-api-workflow-code-quality:
    uses: maykinmedia/open-api-workflows/.github/workflows/code-quality.yml@79102b911003d75203ca2fed7df01ad79d9b6bba  # v6.4.0
    with:
      python-version: "3.12"
      apt-packages: "libgdal-dev gdal-bin"
      node-version: "24"
      postgres-image: "postgis/postgis:16-3.5"

      django-settings-module: "openvtb.conf.ci"
      django-secret-key: dummy
